<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读空间 - PC志愿者服务队</title>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/epub-reader.css">
</head>

<body>
    <div class="reader-container">
        <header class="reader-header">
            <div class="header-left">
                <a href="dashboard.html" class="home-btn" id="homeBtn" title="返回首页">
                    <span class="iconify" data-icon="mdi:home"></span>
                </a>
                <button class="back-btn" id="backBtn" title="返回书架" style="display: none;">
                    <span class="iconify" data-icon="mdi:arrow-left"></span>
                </button>
            </div>
            <div class="header-center">
                <h1 class="book-title" id="bookTitle">书架</h1>
            </div>
            <div class="header-right">
                <div class="progress-info" id="progressInfo" style="display: none;">
                    <span id="progressText">0%</span>
                </div>
                <button class="header-btn" id="tocBtn" title="目录" style="display: none;">
                    <span class="iconify" data-icon="mdi:format-list-bulleted"></span>
                </button>
                <button class="header-btn" id="settingsBtn" title="设置" style="display: none;">
                    <span class="iconify" data-icon="mdi:tune-variant"></span>
                </button>
            </div>
        </header>

        <div class="main-content" id="mainContent">
            <div class="bookshelf" id="bookshelf">
                <div class="bookshelf-header">
                    <h2>选择一本书开始阅读</h2>
                    <p class="bookshelf-tip">点击书籍封面打开阅读</p>
                </div>
                <div class="book-grid" id="bookGrid">
                    <div class="loading-books">
                        <span class="iconify loading-icon" data-icon="mdi:loading"></span>
                        <p>正在加载书架...</p>
                    </div>
                </div>
                <footer class="bookshelf-footer">
                    <p>资源来源于网络/开源社区，版权归原作者或官方所有。</p>
                    <p>仅供个人学习、技术交流，禁止用于商业用途。</p>
                </footer>
            </div>

            <div class="reader-viewer" id="readerViewer" style="display: none;">
                <div class="viewer-wrapper">
                    <div class="epub-viewer" id="epubViewer"></div>
                </div>
            </div>
        </div>

        <aside class="toc-sidebar" id="tocSidebar">
            <div class="toc-header">
                <h3>目录</h3>
                <button class="close-btn" id="closeTocBtn">
                    <span class="iconify" data-icon="mdi:close"></span>
                </button>
            </div>
            <div class="toc-content" id="tocContent">
                <div class="toc-empty">打开书籍后显示目录</div>
            </div>
        </aside>

        <aside class="settings-sidebar" id="settingsSidebar">
            <div class="settings-header">
                <h3>设置</h3>
                <button class="close-btn" id="closeSettingsBtn">
                    <span class="iconify" data-icon="mdi:close"></span>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-group">
                    <p class="setting-label">字体大小</p>
                    <div class="font-size-control">
                        <button class="font-btn" id="decreaseFont" title="减小">
                            <span class="iconify" data-icon="mdi:minus"></span>
                        </button>
                        <span class="font-size-display" id="fontSizeDisplay">100%</span>
                        <button class="font-btn" id="increaseFont" title="增大">
                            <span class="iconify" data-icon="mdi:plus"></span>
                        </button>
                    </div>
                </div>
                <div class="setting-group">
                    <p class="setting-label">主题</p>
                    <div class="theme-grid">
                        <button class="theme-btn active" data-theme="light">
                            <div class="theme-preview"></div>
                            <span>日间</span>
                        </button>
                        <button class="theme-btn" data-theme="sepia">
                            <div class="theme-preview"></div>
                            <span>护眼</span>
                        </button>
                        <button class="theme-btn" data-theme="dark">
                            <div class="theme-preview"></div>
                            <span>夜间</span>
                        </button>
                    </div>
                </div>
                <div class="setting-group">
                    <p class="setting-label">阅读进度</p>
                    <div class="progress-section">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-info-row">
                            <span>已阅读</span>
                            <span id="progressLabel">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="overlay" id="overlay"></div>
    </div>

    <script src="../js/epub-reader.js" type="module"></script>
</body>

</html>
