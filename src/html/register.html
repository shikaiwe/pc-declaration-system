<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
    <script src="../js/crypto-js.min.js"></script>
    <script src="../js/jquery.js"></script>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <h2>用户注册</h2>
        <form class="form" id="registerForm">
            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">邮箱:</label>
                <div class="email-group">
                    <input type="email" id="email" name="email" required>
                    <button type="button" id="sendCodeBtn" class="send-code-btn">发送验证码</button>
                </div>
            </div>
            <div class="form-group">
                <label for="verificationCode">验证码:</label>
                <input type="text" id="verificationCode" name="verificationCode" required maxlength="6">
            </div>
            <div class="form-group">
                <label for="password">密码:</label>
                <input type="password" id="password" name="password" required>
                <div class="password-requirements">
                    密码至少包含8个字符，需包含字母和数字
                </div>
            </div>
            <div class="form-group">
                <label for="confirm-password">确认密码:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <div class="agreement-group">
                <label class="agreement-label">
                    <input type="checkbox" id="agreementCheckbox" required>
                    <span class="agreement-text">
                        我已阅读并同意
                        <a href="javascript:void(0)" class="policy-link" onclick="openPolicyModal('user-agreement')">《用户协议》</a>
                        和
                        <a href="javascript:void(0)" class="policy-link" onclick="openPolicyModal('privacy-policy')">《隐私政策》</a>
                    </span>
                </label>
            </div>
            <button type="submit">注册</button>
            <div class="loading">注册中...</div>
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>
        <div class="links">
            <a href="login.html">已有账号？返回登录</a>
        </div>
    </div>

    <script>
        const ip = 'gznfpc.cn';
        const url = `https://${ip}/api/users/register/`;
        const verifyCodeUrl = `https://${ip}/api/users/register_send_code/`;

        const utils = {
            showError: (message) => {
                const errorElement = document.getElementById('errorMessage');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                setTimeout(() => {
                    errorElement.style.display = 'none';
                }, 3000);
            },

            setLoading: (isLoading) => {
                const loadingElement = document.querySelector('.loading');
                const submitButton = document.querySelector('button[type="submit"]');
                loadingElement.style.display = isLoading ? 'block' : 'none';
                submitButton.disabled = isLoading;
            },

            validatePassword: (password) => {
                const minLength = 8;
                const hasLetter = /[a-zA-Z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                return password.length >= minLength && hasLetter && hasNumber;
            },

            showSuccess: (message) => {
                const successElement = document.getElementById('successMessage');
                successElement.textContent = message;
                successElement.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            },

            startCountdown: (button) => {
                let countdown = 60;
                button.disabled = true;
                const timer = setInterval(() => {
                    button.textContent = `${countdown}秒后重试`;
                    countdown--;
                    if (countdown < 0) {
                        clearInterval(timer);
                        button.disabled = false;
                        button.textContent = '发送验证码';
                    }
                }, 1000);
            }
        };

        // 发送验证码按钮点击事件
        document.getElementById('sendCodeBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const agreementCheckbox = document.getElementById('agreementCheckbox');
            const button = this;

            if (!agreementCheckbox.checked) {
                utils.showError('请先阅读并同意用户协议和隐私政策');
                return;
            }

            if (!email) {
                utils.showError('邮箱不能为空');
                return;
            }

            try {
                button.disabled = true;

                $.ajax({
                    url: verifyCodeUrl,
                    type: "POST",
                    data: JSON.stringify({
                        email: email
                    }),
                    contentType: "application/json",
                    success: function(data) {
                        if (data['message'] === '验证码已发送') {
                            utils.showError("验证码已发送到您的邮箱");
                            utils.startCountdown(button);
                        } else {
                            utils.showError(data['message']);
                            button.disabled = false;
                        }
                    },
                    error: function() {
                        utils.showError('发送失败');
                        button.disabled = false;
                    }
                });
            } catch (error) {
                utils.showError(error.message);
                button.disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const verificationCode = document.getElementById('verificationCode').value;
            const agreementCheckbox = document.getElementById('agreementCheckbox');

            try {
                if (!agreementCheckbox.checked) {
                    throw new Error('请先阅读并同意用户协议和隐私政策');
                }

                if (!email || !verificationCode) {
                    throw new Error('邮箱和验证码不能为空');
                }

                if (!utils.validatePassword(password)) {
                    throw new Error('密码必须至少包含8个字符，且包含字母和数字');
                }

                if (password !== confirmPassword) {
                    throw new Error('两次输入的密码不一致');
                }

                utils.setLoading(true);

                $.ajax({
                    url: url,
                    type: "POST",
                    data: JSON.stringify({
                        name: username,
                        email: email,
                        password: password,
                        code: verificationCode
                    }),
                    contentType: "application/json",
                    success: function(data) {
                        if (data['message'] === 'Success') {
                            utils.showSuccess("注册成功！2秒后自动跳转到登录页面...");
                        } else if (data['message'] === 'Existed') {
                            utils.showError("该昵称已存在，请更换昵称或前往登录");
                        } else if (data['message'] === '邮箱已被注册') {
                            utils.showError("该邮箱已被注册，请更换邮箱或前往登录");
                        } else if (data['message'] === '验证码已过期') {
                            utils.showError("验证码已过期，请重新获取");
                        } else if (data['message'] === '验证码错误') {
                            utils.showError("验证码错误，请重新输入");
                        } else {
                            utils.showError(data['message']);
                        }
                    },
                    error: function() {
                        utils.showError('后端服务器错误！');
                    }
                });
            } catch (error) {
                utils.showError(error.message);
            } finally {
                utils.setLoading(false);
            }
        });
    </script>

一、我们如何收集和使用您的个人信息

1.1 信息收集原则
我们根据《中华人民共和国网络安全法》、《个人信息保护法》和《信息安全技术个人信息安全规范》（GB/T 35273-2020）等相关法律法规的要求，遵循合法、正当、必要的原则收集您的个人信息。

1.2 我们收集的信息类型

（1）账号注册信息
当您注册成为我们的用户时，我们会收集：
- 用户名：用于标识您的身份
- 电子邮箱地址：用于账号验证、密码找回和服务通知
- 手机号码（工作人员注册时）：用于身份验证和紧急联系
- 密码（经加密处理）：用于账号安全保护
- 验证码：用于验证邮箱或手机号的真实性

（2）订单相关信息
当您使用报单服务时，我们会收集：
- 订单内容：包括问题描述、需求说明等
- 订单状态：待分配、已分配、已完成、已撤单等
- 服务时间：预约或实际服务的时间
- 服务人员信息：为您分配的工作人员信息
- 订单评价：您对服务的评分和反馈

（3）设备和使用信息
为了保障服务的安全运行，我们会自动收集：
- 设备信息：设备型号、操作系统版本
- 日志信息：访问时间、操作记录、IP 地址
- Cookie 信息：用于维持登录状态和用户偏好

（4）沟通信息
当您使用留言板功能时，我们会收集：
- 留言内容：您提交的所有文字、图片等信息
- 沟通记录：与工作人员的双向沟通内容
- 消息状态：发送、送达、已读等状态信息

（5）电子书阅读信息
当您使用电子书阅读器时，我们会收集：
- 阅读进度：您阅读的章节和位置
- 阅读偏好：字体大小、主题设置等
- 书架信息：您添加的书籍列表

1.3 信息使用目的
我们将收集的信息用于以下目的：
- 提供和维护报单服务
- 处理您的订单和分配服务人员
- 改善服务质量和用户体验
- 保障系统安全和防止欺诈
- 向您发送服务相关的通知
- 统计分析和产品优化

二、我们如何使用 Cookie 和其他追踪技术

2.1 Cookie 的使用
为确保产品正常运转，我们会在您的设备上存储名为 Cookie 的小数据文件。Cookie 包含标识符、会话信息等，用于：
- 维持您的登录状态
- 记住您的偏好设置
- 统计匿名访问数据
- 保障服务安全

2.2 Cookie 类型
我们使用的 Cookie 包括：
- 严格必要型 Cookie：服务运行所必需
- 功能型 Cookie：记住您的偏好和设置
- 性能型 Cookie：匿名统计使用数据

2.3 Cookie 管理
您可以通过浏览器设置管理或删除 Cookie。但请注意，禁用 Cookie 可能影响某些功能的使用。

三、我们如何共享、转让、公开披露您的个人信息

3.1 共享原则
我们不会与任何第三方公司、组织或个人共享您的个人信息，但以下情况除外：

（1）获得您的明确同意
在获得您的明确同意后，我们会与其他方共享您的个人信息。

（2）法律法规要求
我们可能会根据法律法规规定、诉讼争议解决需要，或按行政、司法机关依法提出的要求，对外共享您的个人信息。

（3）与服务相关的共享
为完成订单服务，我们需要向提供服务的工作人员共享必要的订单信息。

3.2 转让
我们不会将您的个人信息转让给任何公司、组织和个人，但以下情况除外：
- 获得您的明确同意
- 在涉及合并、收购或破产清算时，如涉及到个人信息转让，我们会要求新的持有您个人信息的公司、组织继续受本隐私政策的约束

3.3 公开披露
我们仅会在以下情况下，公开披露您的个人信息：
- 获得您的明确同意
- 基于法律法规、法律程序、诉讼或政府主管部门强制性要求

四、我们如何存储和保护您的个人信息

4.1 信息存储
（1）存储地点：我们在中华人民共和国境内收集和产生的个人信息，存储在境内。
（2）存储期限：我们仅在实现目的所需的时间内保留您的个人信息。超出存储期限后，我们会删除或匿名化处理。

4.2 安全措施
我们使用符合业界标准的安全防护措施保护您的个人信息：
- 数据加密：使用 AES 等加密技术保护数据传输和存储
- 访问控制：严格限制数据访问权限
- 安全审计：定期进行安全评估和漏洞扫描
- 备份机制：建立数据备份和恢复机制

4.3 安全事件处置
如发生个人信息安全事件，我们将按照法律法规的要求，及时向您告知事件基本情况、可能的影响、已采取的措施等。

五、您的权利

根据相关法律法规，您享有以下权利：

5.1 访问和更正
您有权访问和更正您的个人信息。您可以通过登录账号在个人中心查看和修改您的信息。

5.2 删除
在以下情形中，您可以向我们提出删除个人信息的请求：
- 我们违反法律法规或与您的约定收集、使用个人信息
- 我们违反规定与第三方共享您的个人信息
- 您注销了账号

5.3 撤回同意
您可以通过注销账号、删除信息等方式撤回您的同意。

5.4 注销账号
您可以联系我们申请注销账号。注销后，我们将删除或匿名化您的个人信息，法律法规另有规定的除外。

5.5 响应您的请求
为保障安全，您可能需要提供书面请求。我们将在 15 个工作日内做出答复。

        /**
         * 打开政策模态框
         * @param {string} type - 政策类型: 'user-agreement' 或 'privacy-policy'
         */
        function openPolicyModal(type) {
            const modal = document.getElementById('policyModal');
            const title = document.getElementById('policyModalTitle');
            const body = document.getElementById('policyModalBody');

            // 设置标题
            title.textContent = type === 'user-agreement' ? '用户协议' : '隐私政策';
            
            // 直接从嵌入的内容中获取
            const content = POLICY_CONTENT[type];
            if (content) {
                body.innerHTML = '<pre class="policy-text">' + escapeHtml(content) + '</pre>';
            } else {
                body.innerHTML = '<div class="policy-error">内容加载失败</div>';
            }
            
            modal.style.display = 'flex';
        }

        /**
         * 关闭政策模态框
         */
        function closePolicyModal() {
            document.getElementById('policyModal').style.display = 'none';
        }

        /**
         * HTML转义函数
         * @param {string} text - 需要转义的文本
         * @returns {string} 转义后的文本
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击模态框外部关闭
        document.getElementById('policyModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePolicyModal();
            }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePolicyModal();
            }
        });
    </script>
